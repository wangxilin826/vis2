<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据可视化导航</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    padding: 48px 40px;
    max-width: 560px;
    width: 100%;
  }
  h1 {
    font-size: 26px;
    color: #1a1a1a;
    margin-bottom: 8px;
  }
  .subtitle {
    color: #888;
    font-size: 14px;
    margin-bottom: 32px;
  }
  .card-list { display: flex; flex-direction: column; gap: 14px; }
  .card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 22px;
    border: 1px solid #e8e8e8;
    border-radius: 12px;
    text-decoration: none;
    color: #1a1a1a;
    transition: all 0.2s ease;
  }
  .card:hover {
    border-color: #667eea;
    box-shadow: 0 4px 16px rgba(102,126,234,0.15);
    transform: translateY(-2px);
  }
  .card-content { display: flex; flex-direction: column; gap: 4px; }
  .card-title { font-size: 16px; font-weight: 600; }
  .card-desc { font-size: 13px; color: #888; }
  .arrow { color: #667eea; font-size: 20px; }
  .footer { margin-top: 28px; text-align: center; font-size: 12px; color: #aaa; }
</style>
</head>
<body>
  <div class="container">
    <h1>数据可视化</h1>
    <p class="subtitle">点击下方卡片查看图表</p>
    <div class="card-list">
      <a class="card" href="./funnel.html">
        <div class="card-content">
          <span class="card-title">用户转化漏斗分析</span>
          <span class="card-desc">主漏斗 L0-L9 各层级转化情况</span>
        </div>
        <span class="arrow">→</span>
      </a>
      <a class="card" href="./sanjian-channel.html">
        <div class="card-content">
          <span class="card-title">散件各渠道揽收量</span>
          <span class="card-desc">不同渠道日均揽收量分布</span>
        </div>
        <span class="arrow">→</span>
      </a>
    </div>
    <div class="footer">Powered by GitHub Pages</div>
  </div>
</body>
</html>
